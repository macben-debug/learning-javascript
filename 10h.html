<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
    <style>
      body{
        font-family: Arial;
      }
      .subscribe-button{
        background-color: black;
        color: white;
        font-weight:bold ;
        border:none;
        padding-left: 15px;
        padding-top:10px;
        padding-right: 15px;
        padding-bottom:10px;
        border-radius: 50px;
        box-shadow: 1px 1px 1px rgba(0,0, 0,0.03);
        cursor: pointer;
        margin-bottom: 30px;
      }
      .is-subscribed{
        background-color: rgb(240,240,240);
        color:black;
      }
      .cost-input{
        font-size: 15px;
        padding:10px; 
      }
      .calculate-button{
        background-color: green;
        border:none;
        color:white;
        padding:12px 15px;
        font-size: 15px;
        cursor: pointer;
      }

      .error{
        color:red;
      }
    </style>
  </head>
  <body>
    <p>YouTube Subscribe Button</p>
    <button onclick="subscribe()" 
      class="js-subscribe-button subscribe-button">
      Subscribe
    </button>
    <p>Amazon Shipping Calculator</p>
    <input type="text" placeholder="Cost of order" class="js-cost-input cost-input" 
      onkeydown="handleCostKeydown(event)">

    <button class="calculate-button" onclick="calculateTotal()">Calculate</button>

    <p class="js-total-cost"></p>
    <p class="js-error-message  error"></p>
    <script>
      /*String(25)
      console.log('25'-5);

      window.document
      window.console.log('window');
      window.alert

      */
      function handleCostKeydown(event){
        if(event.key ==='Enter'){
        calculateTotal();
      }
      }

      function subscribe(){
        const buttonElement = document.querySelector('.js-subscribe-button');

        if(buttonElement.innerText === 'Subscribe'){
          buttonElement.innerText = 'Subscribed';
          buttonElement.classList.add('is-subscribed');
        }
        else{
          buttonElement.innerText= 'Subscribe';
          buttonElement.classList.remove('is-subscribed');
        }
      }

      function calculateTotal(){
        document.querySelector('.js-error-message').innerHTML= '';
        document.querySelector('.js-total-cost').innerHTML= ``;


        const inputElement= document.querySelector('.js-cost-input');
        let cost =Number( inputElement.value);
        if (cost <0){
          const errorMessage= 'Error: cost cannot be less than $0!';
         //errorMessage.classList.add('error');
          document.querySelector('.js-error-message').innerHTML= errorMessage;

        }
        else{

          if(cost <= 40){
            cost +=10;
          }
          
          document.querySelector('.js-total-cost').innerHTML= `$${cost}`;
        }
      }
    </script>
  </body>
</html>
