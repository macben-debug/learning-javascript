<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles/calculator.css">
  </head>
  <body>
    <p class="js-display calculation-screen"></p>
    <p>
      <button onclick="
        updateCalculation('1');
      ">1</button>

      <button onclick="
        updateCalculation('2');
      ">2</button>

      <button onclick="
        updateCalculation('3');
      ">3</button>

      <button onclick="
        updateCalculation(' + ');
      "class="character">+</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('4');
      ">4</button>

      <button onclick="
        updateCalculation('5');
      ">5</button>

      <button onclick="
        updateCalculation('6');
      ">6</button>

      <button onclick="
        updateCalculation(' - ');
      "class="character">-</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('7');
      ">7</button>

      <button onclick="
        updateCalculation('8');
      ">8</button>

      <button onclick="
        updateCalculation('9');
      " >9</button>

      <button onclick="
        updateCalculation(' * ');
      "class="character">*</button>
    </p>

    <p>
      <button onclick="
        updateCalculation('0');
      ">0</button>

      <button onclick="
        updateCalculation('.');
      ">.</button>

      <button onclick="
        // Note: eval() takes a string and runs it as code.
        // Avoid using eval() in real world projects since
        // it can potentially be given harmful code to run.
        // Only use eval() for learning purposes.
        calculation = eval(calculation);
        //console.log(calculation);
        showAnswer();
        
        localStorage.setItem('calculation',calculation);
      ">=</button>

      <button onclick="
        updateCalculation(' / ');
      "class="character">/</button>
    </p>

    <p>
      <button onclick="
        calculation = '';
        //console.log(calculation);
        showAnswer();

        localStorage.setItem('calculation',calculation);
      "
      class="clear">Clear</button>
    </p>

    <script src="scripts/calculator.js"></script> 
    </script>
  </body>
</html>
