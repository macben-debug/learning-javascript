<!DOCTYPE html>
<html>
  <head>
    <title></title>
  </head>
  <body>
    <button>9a</button>
    <button class="js-button">9b</button>

    <button onclick="movePicker('heads')">heads</button>
    <button onclick="movePicker('tails')">tails</button>

    <p class="js-move-picker"></p>


    
    <input  placeholder="Name"class= "text" onkeydown="handleCostKeydown(event)">
    <button onclick="textDisplay()">Submit</button>
    <p class="js-text-display"></p>
  

    <script>
    ///console.log( document.querySelector('button'));
      document.querySelector('.js-button').innerHTML = '9b done!';

      function movePicker(move){
        document.querySelector('.js-move-picker').innerHTML = `You chose: ${move}`;
      }

      function textDisplay(){
      let message = document.querySelector('.text');
      document.querySelector('.js-text-display').innerHTML = `Your name is: ${message.value}`;
      }
      function handleCostKeydown(event){
        if(event.key ==='Enter'){
          textDisplay();
        }
      }
    </script>
  </body>
</html>
