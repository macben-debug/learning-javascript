      function findIndex(array,word){
        let index =-1;

        for (let i =0;i<array.length;i++){
          if (array[i] ===word){
            index =i;
            break;
          }
        }
        return index;
      }
      //console.log(findIndex(['green','red','blue','red'],'red'));

      function uniique(array){
        let result =[];
        for (let i =0; i<array.length;i++){
          const word =  array[i];
          if (findIndex(result,word === -1)){
            result.push(word);
          }
        }
        return result;
      }
      //console.log(uniique(['green','red','blue','red']));

      function removeEgg(foods){
        foods = foods.slice().reverse();

        let food =[];

          if(foods[i] === 'egg' & count <2){
            count++;
           continue;

          }
          food.push(foods[i]);
         
        }
        return food.reverse();
      }
